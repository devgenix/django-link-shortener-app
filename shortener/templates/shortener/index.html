<!DOCTYPE html>
<html>
<body>
    <h1>Link Shortener</h1>
    <form method="post">
        {% csrf_token %}
        <input type="url" name="url" placeholder="Enter URL" required>
        <button type="submit">Shorten</button>
    </form>
    {% if link %}
    <p>Short URL: <strong>{{ request.get_host }}/{{ link.short_code }}</strong></p>
    {% endif %}
</body>
</html>
