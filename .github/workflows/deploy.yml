name: Deploy to EC2 (Docker)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose
              sudo usermod -aG docker ubuntu
            fi

            # Ensure directory exists and has correct permissions
            sudo mkdir -p /home/ubuntu/app
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app

            # Setup directory and handle Git safe directory
            if [ ! -d "/home/ubuntu/app/.git" ]; then
              rm -rf /home/ubuntu/app/*
              git clone https://github.com/devgenix/django-link-shortener-app.git /home/ubuntu/app
            fi

            cd /home/ubuntu/app
            
            # Configure git safe directory to avoid ownership errors
            git config --global --add safe.directory /home/ubuntu/app
            
            # Reset and pull latest
            git fetch origin main
            git reset --hard origin/main

            # Run with Docker Compose
            sudo docker-compose down || true
            sudo docker-compose up --build -d
